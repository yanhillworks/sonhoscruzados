<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonhos cruzados</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mukta+Vaani:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
    }
  </style>
</head>
<body>

<script>
let table;
let csvData = [];

// =========================================================================
// --- 1. USER DEFAULTS CONFIGURATION SECTION ---
// Change these values to set the visual style
// =========================================================================

// --- Mode 1 (Primary Highlighted Neural Style) Defaults ---
const DEFAULT_M1_EDGE_COLOR = '#B20003'; // Dark red
const DEFAULT_M1_EDGE_THICK_VAL = 16;      // Value (Starting variable 'X')

const DEFAULT_M1_DOT_COLOR = '#840002';  // Yellowish
const DEFAULT_M1_DOT_RADIUS_VAL = 2;      // Value

const DEFAULT_M1_WORD_COLOR = '#f4f4f4'; // Dark gray
const DEFAULT_M1_WORD_SIZE_VAL = 14;     // Value

// --- Mode 3 (Secondary Highlighted Neural Style) Defaults ---
const DEFAULT_M3_EDGE_COLOR = '#005AE2'; // Dark blue
const DEFAULT_M3_EDGE_THICK_VAL = 12;      // Value (Starting variable 'X')

const DEFAULT_M3_DOT_COLOR = '#840002';  // Yellowish
const DEFAULT_M3_DOT_RADIUS_VAL = 2;      // Value

const DEFAULT_M3_WORD_COLOR = '#f4f4f4'; // Dark gray
const DEFAULT_M3_WORD_SIZE_VAL = 14;     // Value

// --- Mode 2 (Background Mesh Style) Defaults ---
const DEFAULT_M2_EDGE_COLOR = '#353637'; // Black
const DEFAULT_M2_EDGE_THICK_VAL = 75;      // Value
const M2_MIN_THICKNESS = 1;             // Constant for dynamic tapering limit

const DEFAULT_M2_DOT_COLOR = '#353637';  // Black
const DEFAULT_M2_DOT_RADIUS_VAL = 1;      // Value

const DEFAULT_M2_WORD_COLOR = '#FFFFFF'; // White
const DEFAULT_M2_WORD_SIZE_VAL = 10;     // Value

// Global Color Variables initialized in setup()
let c_m1Edge, c_m1Dot, c_m1Word;
let c_m2Edge, c_m2Dot, c_m2Word;
let c_m3Edge, c_m3Dot, c_m3Word;

// =========================================================================
// --- END DEFAULTS CONFIGURATION SECTION ---
// =========================================================================

// Global Data Shared Context
let themesID = [];

// Split Screen State Controls
let isSplitScreen = false;
let viz1;
let viz2;

function preload() {
  table = loadTable('dataset_pred_labeled_21703_objects.csv', 'csv', 'header');
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  
  // Initialize color objects from hex constants
  c_m1Edge = color(DEFAULT_M1_EDGE_COLOR);
  c_m1Dot = color(DEFAULT_M1_DOT_COLOR);
  c_m1Word = color(DEFAULT_M1_WORD_COLOR);
  
  c_m2Edge = color(DEFAULT_M2_EDGE_COLOR);
  c_m2Dot = color(DEFAULT_M2_DOT_COLOR);
  c_m2Word = color(DEFAULT_M2_WORD_COLOR);
  
  c_m3Edge = color(DEFAULT_M3_EDGE_COLOR);
  c_m3Dot = color(DEFAULT_M3_DOT_COLOR);
  c_m3Word = color(DEFAULT_M3_WORD_COLOR);
  
  for (let r = 0; r < table.getRowCount(); r++) {
    let row = table.getRow(r);
    csvData.push({
      index: row.getString('index'),
      pred: parseInt(row.getString('pred'), 10),
      label1: row.getString('label1'),
      label1_full: row.getString('label1_full')
    });
  }

  let uniqueThemes = new Set(csvData.map(r => r.pred));
  themesID = Array.from(uniqueThemes).sort((a, b) => a - b);

  if (themesID.length > 0) {
    viz1 = new ThemeVisualizer(0, 0, width, height);
    viz1.setRandomTheme();
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  
  if (isSplitScreen && viz1 && viz2) {
    viz1.resize(0, 0, width / 2, height);
    viz2.resize(width / 2, 0, width / 2, height);
  } else if (viz1) {
    viz1.resize(0, 0, width, height);
  }
}

function draw() {
  background(0); // Pure black background
  
  if (viz1) viz1.draw();
  
  if (isSplitScreen && viz2) {
    viz2.draw();
    
    // Draw the structural vertical divider line in the exact center
    push();
    stroke(50);
    strokeWeight(2);
    line(width / 2, 0, width / 2, height);
    pop();
  }
}

function keyPressed() {
  // Manual Highlight Advance
  if (key === 'n' || key === 'N') {
    if (viz1) viz1.triggerTransition('manual_advance');
    if (isSplitScreen && viz2) viz2.triggerTransition('manual_advance');
  }
  
  // Randomize Theme
  if (key === 'm' || key === 'M') {
    if (viz1) viz1.setRandomTheme();
    if (isSplitScreen && viz2) {
      let attempts = 0;
      do {
        viz2.setRandomTheme();
        attempts++;
      } while (viz2.selectedThemeIDIndex === viz1.selectedThemeIDIndex && themesID.length > 1 && attempts < 100);
    }
  }
  
  // Toggle Split Screen
  if (key === '2') {
    isSplitScreen = !isSplitScreen;
    if (isSplitScreen) {
      viz1.resize(0, 0, width / 2, height);
      viz2 = new ThemeVisualizer(width / 2, 0, width / 2, height);
      
      let attempts = 0;
      do {
        viz2.setRandomTheme();
        attempts++;
      } while (viz2.selectedThemeIDIndex === viz1.selectedThemeIDIndex && themesID.length > 1 && attempts < 100);
      
    } else {
      viz1.resize(0, 0, width, height);
      viz2 = null;
    }
  }
}

// Helper to extract words
function getWordsFromString(str) {
  let raw = str ? str.toLowerCase() : "";
  return raw.match(/[\wà-ú]+/g) || [];
}

// =========================================================================
// --- GRAPH ENGINE / THEME VISUALIZER CLASS ---
// =========================================================================

class ThemeVisualizer {
  constructor(offsetX, offsetY, w, h) {
    this.offsetX = offsetX;
    this.offsetY = offsetY;
    this.w = w;
    this.h = h;
    
    this.nodes = {};
    this.edges = [];
    
    this.selectedThemeIDIndex = 0;
    this.selectedThemeID = null;
    this.selectedTheme = "";
    this.selectedWordsTheme = [];
    this.selectedThemeDreams = [];
    
    this.currentHighlightIndex = 0;
    this.currentSecondHighlightIndex = -1;
    
    this.primaryIsFront = true;
    this.lastAutoChangeTime = millis();
    this.maxGraphLevel = 0;
    
    this.isTransitioning = false;
    this.transitionStartTime = 0;
    this.p5_nextAction = null;
  }
  
  resize(offsetX, offsetY, w, h) {
    this.offsetX = offsetX;
    this.offsetY = offsetY;
    this.w = w;
    this.h = h;
  }
  
  setRandomTheme() {
    if (themesID.length > 0) {
      this.selectedThemeIDIndex = floor(random(themesID.length));
      this.updateThemeData();
    }
  }
  
  updateThemeData() {
    this.selectedThemeID = themesID[this.selectedThemeIDIndex];
    let themeRows = csvData.filter(r => r.pred === this.selectedThemeID);
    
    if (themeRows.length > 0) {
      this.selectedTheme = themeRows[0].label1;
      this.selectedWordsTheme = [...new Set(themeRows.map(r => r.label1_full))];
      this.selectedThemeDreams = themeRows.map(r => r.index);
      this.currentHighlightIndex = 0;
      
      this.updateSecondHighlight();
      this.generateGraph();
  
      this.primaryIsFront = true;
      this.lastAutoChangeTime = millis();
      this.isTransitioning = false;
      this.p5_nextAction = null;
    }
  }
  
  triggerTransition(action) {
    if (this.selectedThemeDreams.length > 0 && !this.isTransitioning) {
      this.isTransitioning = true;
      this.transitionStartTime = millis();
      this.p5_nextAction = action;
    }
  }
  
  updateSecondHighlight() {
    if (this.selectedThemeDreams.length <= 1) {
      this.currentSecondHighlightIndex = -1;
      return;
    }
  
    let newIndex;
    do {
      newIndex = floor(random(this.selectedThemeDreams.length));
    } while (newIndex === this.currentHighlightIndex);
  
    this.currentSecondHighlightIndex = newIndex;
  }
  
  generateGraph() {
    this.nodes = {};
    this.edges = [];
  
    let uniqueWords = [];
    let segments = [];
  
    for (let item of this.selectedThemeDreams) {
      let words = item.toLowerCase().match(/[\wà-ú]+/g);
      if (words && words.length > 0) {
        segments.push(words);
        for (let w of words) {
          if (!uniqueWords.includes(w)) uniqueWords.push(w);
        }
      }
    }
    
    if (uniqueWords.length === 0) return;
  
    let radius = min(this.w, this.h) * 0.4;
    for (let i = 0; i < uniqueWords.length; i++) {
      let word = uniqueWords[i];
      let angle = map(i, 0, uniqueWords.length, 0, TWO_PI);
      
      let startX = this.w / 2 + cos(angle) * radius * 0.5;
      let startY = this.h / 2 + sin(angle) * radius * 0.5;
      
      this.nodes[word] = new Node(word, startX, startY);
    }
  
    let edgeMap = {};
    for (let words of segments) {
      for (let i = 0; i < words.length; i++) {
        let word = words[i];
        this.nodes[word].connections++; 
        
        if (i < words.length - 1) {
          let nextWord = words[i + 1];
          if (nextWord === 'sonhei') continue;
          
          let edgeKey = word + "-" + nextWord;
          if (!edgeMap[edgeKey]) {
            edgeMap[edgeKey] = { source: word, target: nextWord, weight: 1 };
          } else {
            edgeMap[edgeKey].weight++; 
          }
        }
      }
    }
  
    let rootWord = "sonhei";
    if (!this.nodes[rootWord] && segments.length > 0) rootWord = segments[0][0];
    
    if (this.nodes[rootWord]) {
      this.nodes[rootWord].isRoot = true;
      this.nodes[rootWord].level = 0;
  
      let queue = [this.nodes[rootWord]];
      while (queue.length > 0) {
        let current = queue.shift();
        
        for (let key in edgeMap) {
          if (edgeMap[key].source === current.word) {
            let targetNode = this.nodes[edgeMap[key].target];
            if (targetNode.level === Infinity) {
              targetNode.level = current.level + 1;
              queue.push(targetNode);
            }
          }
        }
      }
    }
  
    this.maxGraphLevel = 0;
    for (let key in this.nodes) {
      if (this.nodes[key].level !== Infinity && this.nodes[key].level > this.maxGraphLevel) {
        this.maxGraphLevel = this.nodes[key].level;
      }
    }
  
    for (let key in edgeMap) {
      let e = edgeMap[key];
      let sourceNode = this.nodes[e.source];
      let structuralLevel = sourceNode.level === Infinity ? 2 : sourceNode.level;
      
      this.edges.push({ 
        source: sourceNode, 
        target: this.nodes[e.target], 
        weight: e.weight, 
        structuralLevel: structuralLevel
      });
    }
  }
  
  updatePhysics() {
    let nodeArray = Object.values(this.nodes);
    if (nodeArray.length === 0) return;
    
    let repForceMult = 1 + (nodeArray.length * 300); 
    let baseSpringRestLen = 60; 
    let baseSpringK = 0.05;
    let centerGravity = 0.0001; 
    let damping = 0.85; 
    let maxSpeed = 40; 
    let maxRepulsionDist = max(this.w, this.h) * 0.15;
  
    for (let i = 0; i < nodeArray.length; i++) {
      for (let j = i + 1; j < nodeArray.length; j++) {
        let n1 = nodeArray[i];
        let n2 = nodeArray[j];
        let dx = n1.x - n2.x;
        let dy = n1.y - n2.y;
        let d = dist(n1.x, n1.y, n2.x, n2.y);
        
        if (d > 0 && d < maxRepulsionDist) {
          let force = repForceMult / (d * d + 50);
          let fx = (dx / d) * force;
          let fy = (dy / d) * force;
          n1.vx += fx; n1.vy += fy;
          n2.vx -= fx; n2.vy -= fy;
        }
      }
    }
    
    for (let edge of this.edges) {
      let dx = edge.target.x - edge.source.x;
      let dy = edge.target.y - edge.source.y;
      let d = dist(edge.source.x, edge.source.y, edge.target.x, edge.target.y);
      
      if (d > 0) {
        let dynamicRestLen = Math.max(baseSpringRestLen - (edge.weight * 5), 20); 
        let dynamicSpringK = baseSpringK * (1 + edge.weight * 0.2); 
        
        let force = (d - dynamicRestLen) * dynamicSpringK;
        let fx = (dx / d) * force;
        let fy = (dy / d) * force;
        edge.source.vx += fx; edge.source.vy += fy;
        edge.target.vx -= fx; edge.target.vy -= fy;
      }
    }
    
    for (let n of nodeArray) {
      n.vx += (this.w / 2 - n.x) * centerGravity;
      
      let graphCenterY = this.h / 2;
      let levelOffset = (n.level !== Infinity ? n.level - (this.maxGraphLevel / 2) : 0) * 60;
      let targetY = graphCenterY + levelOffset;
      
      n.vy += (targetY - n.y) * 0.005;
      
      n.vx = constrain(n.vx, -maxSpeed, maxSpeed);
      n.vy = constrain(n.vy, -maxSpeed, maxSpeed);
  
      n.x += n.vx;
      n.y += n.vy;
      
      n.vx *= damping;
      n.vy *= damping;
    }
  }

  draw() {
    push();
    translate(this.offsetX, this.offsetY);
    
    // Hard clipping bound area so the graph physically does not escape its box boundaries
    drawingContext.save();
    drawingContext.beginPath();
    drawingContext.rect(0, 0, this.w, this.h);
    drawingContext.clip();
    
    this.updatePhysics();
  
    // --- ANIMATION TRANSITION ENGINE ---
    let transProgress = 0;
    if (this.isTransitioning) {
      transProgress = (millis() - this.transitionStartTime) / 1000.0;
      if (transProgress >= 1.0) {
        transProgress = 1.0;
        this.isTransitioning = false;
        
        if (this.p5_nextAction === 'auto_advance' || this.p5_nextAction === 'manual_advance') {
          if (this.selectedThemeDreams.length > 0) {
            let attempts = 0;
            do {
              this.currentHighlightIndex = (this.currentHighlightIndex + 1) % this.selectedThemeDreams.length;
              attempts++;
            } while (this.currentHighlightIndex === this.currentSecondHighlightIndex && this.selectedThemeDreams.length > 1 && attempts < this.selectedThemeDreams.length);
          }
          this.primaryIsFront = true;
        }
        this.lastAutoChangeTime = millis();
        this.p5_nextAction = null;
      }
    }
  
    // --- AUTOMATIC ALTERNATING HIGHLIGHT TIMER ---
    if (!this.isTransitioning) {
      if (millis() - this.lastAutoChangeTime >= 5000) {
        if (this.primaryIsFront) {
          this.updateSecondHighlight();
          this.primaryIsFront = false;
          this.lastAutoChangeTime = millis();
        } else {
          this.triggerTransition('auto_advance');
        }
      }
    }
    
    let path1Str = this.selectedThemeDreams.length > 0 ? this.selectedThemeDreams[this.currentHighlightIndex] : "";
    let path2Str = (this.currentSecondHighlightIndex >= 0 && this.selectedThemeDreams.length > this.currentSecondHighlightIndex) ? this.selectedThemeDreams[this.currentSecondHighlightIndex] : "";
    
    let path1Words = getWordsFromString(path1Str);
    let path2Words = getWordsFromString(path2Str);
    
    let totalEdgesPath1 = Math.max(path1Words.length - 1, 0);
    let totalEdgesPath2 = Math.max(path2Words.length - 1, 0);
    
    let high1Words = new Set(path1Words);
    let high2Words = new Set(path2Words);
    
    let high1Pairs = new Map();
    let high2Pairs = new Map();
    
    for (let i = 0; i < path1Words.length - 1; i++) {
      let edgeKey = path1Words[i] + "->" + path1Words[i+1];
      if (!high1Pairs.has(edgeKey)) high1Pairs.set(edgeKey, i);
    }
    for (let i = 0; i < path2Words.length - 1; i++) {
      let edgeKey = path2Words[i] + "->" + path2Words[i+1];
      if (!high2Pairs.has(edgeKey)) high2Pairs.set(edgeKey, i);
    }
    
    let normalEdges = [];
    let edgesHigh1 = [];
    let edgesHigh2 = [];
    
    for (let edge of this.edges) {
      let edgeKey = edge.source.word + "->" + edge.target.word;
      
      if (high1Pairs.has(edgeKey)) {
        edgesHigh1.push({ data: edge, step: high1Pairs.get(edgeKey) });
      } else if (high2Pairs.has(edgeKey)) {
        edgesHigh2.push({ data: edge, step: high2Pairs.get(edgeKey) });
      } else {
        normalEdges.push(edge);
      }
    }
    
    for (let edge of normalEdges) {
      drawOrganicEdge(edge.source, edge.target, 2, -1, 0, edge.structuralLevel, this.maxGraphLevel);
    }
    for (let key in this.nodes) {
      if (!high1Words.has(key) && !high2Words.has(key)) {
        this.nodes[key].display(2);
      }
    }
    
    if (this.primaryIsFront) {
      for (let item of edgesHigh2) {
        drawOrganicEdge(item.data.source, item.data.target, 3, item.step, totalEdgesPath2, null, this.maxGraphLevel);
      }
      for (let key in this.nodes) {
        if (high2Words.has(key) && !high1Words.has(key)) {
          this.nodes[key].display(3);
        }
      }
      
      for (let item of edgesHigh1) {
        let currentStyle = 1;
        if (this.isTransitioning) {
          let edgeP = totalEdgesPath1 > 1 ? item.step / (totalEdgesPath1 - 1) : 0;
          if (edgeP >= (1 - transProgress)) currentStyle = 3; 
        }
        drawOrganicEdge(item.data.source, item.data.target, currentStyle, item.step, totalEdgesPath1, null, this.maxGraphLevel);
      }
      for (let key in this.nodes) {
        if (high1Words.has(key)) {
          let currentStyle = 1;
          if (this.isTransitioning) {
            let idx = path1Words.indexOf(key);
            let nodeP = path1Words.length > 1 ? idx / (path1Words.length - 1) : 0;
            if (nodeP >= (1 - transProgress)) currentStyle = 3; 
          }
          this.nodes[key].display(currentStyle);
        }
      }
    } else {
      for (let item of edgesHigh1) {
        let currentStyle = 1;
        if (this.isTransitioning) {
          let edgeP = totalEdgesPath1 > 1 ? item.step / (totalEdgesPath1 - 1) : 0;
          if (edgeP >= (1 - transProgress)) currentStyle = 3; 
        }
        drawOrganicEdge(item.data.source, item.data.target, currentStyle, item.step, totalEdgesPath1, null, this.maxGraphLevel);
      }
      for (let key in this.nodes) {
        if (high1Words.has(key) && !high2Words.has(key)) {
          let currentStyle = 1;
          if (this.isTransitioning) {
            let idx = path1Words.indexOf(key);
            let nodeP = path1Words.length > 1 ? idx / (path1Words.length - 1) : 0;
            if (nodeP >= (1 - transProgress)) currentStyle = 3; 
          }
          this.nodes[key].display(currentStyle);
        }
      }
      
      for (let item of edgesHigh2) {
        drawOrganicEdge(item.data.source, item.data.target, 3, item.step, totalEdgesPath2, null, this.maxGraphLevel);
      }
      for (let key in this.nodes) {
        if (high2Words.has(key)) {
          this.nodes[key].display(3);
        }
      }
    }
  
    this.drawHUD();
    
    drawingContext.restore();
    pop();
  }

  drawHUD() {
    if (!this.selectedWordsTheme || this.selectedWordsTheme.length === 0) return;
  
    push();
    let paddingLeft = 24;
    let wordSize = 14;
    let lineSpacing = 8;
    
    let numWords = this.selectedWordsTheme.length;
    let totalHeight = 0;
    if (numWords > 0) {
      totalHeight = numWords * (wordSize + lineSpacing) - lineSpacing; 
    }
    
    let startY = (this.h / 2) - (totalHeight / 2);
    
    textFont('Mukta Vaani');
    textAlign(LEFT, TOP);
    noStroke();
    textStyle(NORMAL);
    textSize(wordSize);
    fill(200); 
    
    for (let i = 0; i < this.selectedWordsTheme.length; i++) {
      text(this.selectedWordsTheme[i], paddingLeft, startY);
      startY += wordSize + lineSpacing;
    }
    pop();
  }
}

// Global edge rendering helper function
function drawOrganicEdge(source, target, styleMode, highlightStep, totalHighlightEdges, hierarchyLevel, maxGraphLevel) {
  let distance = dist(source.x, source.y, target.x, target.y);
  if (distance < 3) return;
  
  let thickness;
  let baseColor;
  let alphaVal;
  
  if (styleMode === 1) {
    if (totalHighlightEdges > 1) {
      thickness = map(highlightStep, 0, totalHighlightEdges - 1, DEFAULT_M1_EDGE_THICK_VAL, 1);
    } else {
      thickness = DEFAULT_M1_EDGE_THICK_VAL;
    }
    baseColor = c_m1Edge;
    alphaVal = 255; 
  } else if (styleMode === 3) {
    if (totalHighlightEdges > 1) {
      thickness = map(highlightStep, 0, totalHighlightEdges - 1, DEFAULT_M3_EDGE_THICK_VAL, 1);
    } else {
      thickness = DEFAULT_M3_EDGE_THICK_VAL;
    }
    baseColor = c_m3Edge;
    alphaVal = 255;
  } else {
    let baseThick = DEFAULT_M2_EDGE_THICK_VAL;
    thickness = map(hierarchyLevel, 0, maxGraphLevel, baseThick, M2_MIN_THICKNESS, true);
    thickness = Math.max(thickness, M2_MIN_THICKNESS);
    baseColor = c_m2Edge;
    alphaVal = 255; 
  }

  push();
  strokeWeight(thickness);
  stroke(red(baseColor), green(baseColor), blue(baseColor), alphaVal);
  noFill();
  strokeCap(ROUND);
  strokeJoin(ROUND);
  
  beginShape();
  let segments = 5; 
  for (let i = 0; i <= segments; i++) {
    let t = i / segments;
    let bx = lerp(source.x, target.x, t);
    let by = lerp(source.y, target.y, t);
    
    if (i > 0 && i < segments) {
      let noiseVal = noise(bx * 0.02, by * 0.02, frameCount * 0.001);
      let angle = atan2(target.y - source.y, target.x - source.x) + HALF_PI;
      let offsetDist = map(noiseVal, 0, 1, -distance * 0.15, distance * 0.15);
      
      bx += cos(angle) * offsetDist;
      by += sin(angle) * offsetDist;
    }
    vertex(bx, by);
  }
  endShape();
  pop();
}

// Global Node Object Blueprint
class Node {
  constructor(word, x, y) {
    this.word = word;
    this.x = x;
    this.y = y;
    this.vx = 0;
    this.vy = 0;
    this.isRoot = false;
    this.connections = 0; 
    this.level = Infinity; 
  }
  
  display(styleMode) {
    push();
    translate(this.x, this.y);
    
    noStroke();
    let currentRadius;
    let wColor, wSize;
    
    if (styleMode === 1) {
      fill(c_m1Dot); 
      currentRadius = DEFAULT_M1_DOT_RADIUS_VAL;
      wColor = c_m1Word;
      wSize = DEFAULT_M1_WORD_SIZE_VAL;
    } else if (styleMode === 3) {
      fill(c_m3Dot); 
      currentRadius = DEFAULT_M3_DOT_RADIUS_VAL;
      wColor = c_m3Word;
      wSize = DEFAULT_M3_WORD_SIZE_VAL;
    } else {
      let c = c_m2Dot;
      fill(red(c), green(c), blue(c), 50); 
      currentRadius = DEFAULT_M2_DOT_RADIUS_VAL;
    }
    
    if (currentRadius > 0) circle(0, 0, currentRadius * 2);
    
    if (styleMode === 1 || styleMode === 3) {
      textFont('Mukta Vaani');
      textAlign(LEFT, CENTER);
      textStyle(BOLD);
      
      // MODIFIED: Force the word 'sonhei' to render as green
      if (this.word === 'sonhei') {
        fill('#00FF00'); // Green hex color
      } else {
        fill(wColor); 
      }
      
      textSize(wSize);    
      text(this.word, currentRadius + 4, 0); 
    }
    
    pop();
  }
}
</script>
